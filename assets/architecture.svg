<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 470" font-family="'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/>
    </marker>
    <marker id="arr-teal" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#14b8a6"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1080" height="470" fill="#ffffff"/>

  <!-- Title -->
  <text x="540" y="40" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">RAG, end to end</text>
  <text x="540" y="64" text-anchor="middle" font-size="13.5" fill="#64748b">build it by hand — one runnable file (and notebook) per stage</text>

  <!-- ===================== INDEXING LANE ===================== -->
  <rect x="30" y="92" width="1020" height="150" rx="14" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="52" y="120" font-size="13" font-weight="700" fill="#0f766e" letter-spacing="0.06em">INDEXING</text>
  <text x="135" y="120" font-size="12" fill="#94a3b8">— done once, up front, whenever documents change</text>

  <!-- Indexing boxes -->
  <g>
    <rect x="52" y="138" width="200" height="78" rx="11" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="152" y="172" text-anchor="middle" font-size="16" font-weight="600" fill="#0f172a">Document</text>
    <text x="152" y="194" text-anchor="middle" font-size="11.5" fill="#64748b">raw source (PDF, wiki…)</text>

    <rect x="296" y="138" width="200" height="78" rx="11" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="396" y="172" text-anchor="middle" font-size="16" font-weight="600" fill="#0f172a">Chunk</text>
    <text x="396" y="194" text-anchor="middle" font-size="11.5" fill="#0f766e" font-weight="600">Part 5</text>

    <rect x="540" y="138" width="200" height="78" rx="11" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="640" y="172" text-anchor="middle" font-size="16" font-weight="600" fill="#0f172a">Embed</text>
    <text x="640" y="194" text-anchor="middle" font-size="11.5" fill="#0f766e" font-weight="600">Part 2</text>

    <rect x="784" y="138" width="200" height="78" rx="11" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="884" y="172" text-anchor="middle" font-size="16" font-weight="600" fill="#0f172a">Store</text>
    <text x="884" y="194" text-anchor="middle" font-size="11.5" fill="#0f766e" font-weight="600">Part 4</text>
  </g>
  <!-- Indexing arrows -->
  <line x1="256" y1="177" x2="290" y2="177" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="500" y1="177" x2="534" y2="177" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="744" y1="177" x2="778" y2="177" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ===================== QUERYING LANE ===================== -->
  <rect x="30" y="284" width="1020" height="150" rx="14" fill="#f0fdfa" stroke="#99f6e4"/>
  <text x="52" y="312" font-size="13" font-weight="700" fill="#0f766e" letter-spacing="0.06em">QUERYING</text>
  <text x="135" y="312" font-size="12" fill="#5eaaa0">— done per question, in milliseconds</text>

  <!-- Querying boxes -->
  <g>
    <rect x="52" y="330" width="200" height="78" rx="11" fill="#ffffff" stroke="#5eead4"/>
    <text x="152" y="364" text-anchor="middle" font-size="16" font-weight="600" fill="#0f172a">Retrieve</text>
    <text x="152" y="386" text-anchor="middle" font-size="11.5" fill="#0f766e" font-weight="600">Parts 3 &amp; 4</text>

    <rect x="296" y="330" width="200" height="78" rx="11" fill="#ffffff" stroke="#5eead4"/>
    <text x="396" y="364" text-anchor="middle" font-size="16" font-weight="600" fill="#0f172a">Augment</text>
    <text x="396" y="386" text-anchor="middle" font-size="11.5" fill="#0f766e" font-weight="600">Part 1</text>

    <rect x="540" y="330" width="200" height="78" rx="11" fill="#ffffff" stroke="#5eead4"/>
    <text x="640" y="364" text-anchor="middle" font-size="16" font-weight="600" fill="#0f172a">Generate</text>
    <text x="640" y="386" text-anchor="middle" font-size="11.5" fill="#0f766e" font-weight="600">Part 6</text>

    <rect x="784" y="330" width="200" height="78" rx="11" fill="#ecfdf5" stroke="#6ee7b7"/>
    <text x="884" y="364" text-anchor="middle" font-size="16" font-weight="600" fill="#065f46">Grounded answer</text>
    <text x="884" y="386" text-anchor="middle" font-size="11.5" fill="#10b981" font-weight="600">cited from your data</text>
  </g>
  <!-- Querying arrows -->
  <line x1="256" y1="369" x2="290" y2="369" stroke="#14b8a6" stroke-width="2" marker-end="url(#arr-teal)"/>
  <line x1="500" y1="369" x2="534" y2="369" stroke="#14b8a6" stroke-width="2" marker-end="url(#arr-teal)"/>
  <line x1="744" y1="369" x2="778" y2="369" stroke="#14b8a6" stroke-width="2" marker-end="url(#arr-teal)"/>

  <!-- Store -> Retrieve (the index feeds retrieval) -->
  <path d="M884,216 L884,250 Q884,262 872,262 L164,262 Q152,262 152,274 L152,326"
        fill="none" stroke="#94a3b8" stroke-width="2" stroke-dasharray="5 5" marker-end="url(#arr)"/>
  <text x="518" y="256" text-anchor="middle" font-size="11" fill="#94a3b8">the stored index is what retrieval searches</text>

  <!-- Parts 7–12 footnote -->
  <text x="540" y="456" text-anchor="middle" font-size="11.5" fill="#64748b">Parts 7–12 then sharpen this loop: hybrid retrieval, reranking, advanced patterns, evaluation, and production hardening.</text>
</svg>
